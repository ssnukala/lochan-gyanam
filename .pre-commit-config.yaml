# Workstream D2 — Lochan pre-commit gate.
#
# All hooks are `local` so they execute against the developer's own
# daksh-cli (installed under tools/daksh/). No network fetch, no
# pinned-version drift — the hooks use whatever daksh the workstation
# has.
#
# Installed by:    daksh setup    (or: pre-commit install)
# Uninstalled by:  pre-commit uninstall
#
# These hooks complement (do not replace) the daksh gate hooks that
# live directly in each repo's .git/hooks. Keep both:
#   - pre-commit framework       → gyanam-wide policy (this file)
#   - daksh gate hooks           → per-repo, per-tier enforcement
#
# If you remove a hook here, re-run `daksh setup` to refresh.

repos:
  - repo: local
    hooks:
      - id: daksh-janch-changed
        name: daksh janch (changed packages only)
        entry: tools/daksh/daksh-cli janch --changed --ci --threshold 80
        language: system
        pass_filenames: false
        always_run: true
        description: Run janch on packages touched by this commit.

      - id: daksh-evolve-standard-changed
        name: daksh evolve --mode standard (changed packages)
        entry: tools/daksh/daksh-cli evolve --changed --mode standard --ci --threshold 80
        language: system
        pass_filenames: false
        always_run: true
        description: Run evolve at standard mode on packages touched by this commit.

      - id: no-plaintext-env
        name: reject tracked .env files
        entry: tools/daksh/scripts/precommit-no-plaintext-env.sh
        language: system
        pass_filenames: false
        always_run: true
        description: Refuse commits that include a plaintext .env file.

      # Incident 2026-04-26: parent session's `git checkout -f main` silently
      # discarded a parallel Drasta session's uncommitted production-file
      # edits. This hook reads `.daksh/in-flight/<session-id>.json` sentinels
      # and BLOCKS commits that touch files actively in flight in ANOTHER
      # session. Sessions register in-flight state via `daksh session-start`.
      # Stale sentinels (>4h heartbeat) warn; very stale (>24h) ignored.
      - id: parallel-session-check
        name: block commits overlapping parallel-session in-flight files
        entry: tools/daksh/scripts/precommit-parallel-session-check.py
        language: system
        pass_filenames: false
        always_run: true
        description: |
          Read `.daksh/in-flight/*.json` sentinels and refuse commits whose
          staged files conflict with another session's actively-modified
          files. Prevents the silent-overwrite failure mode that lost
          ~640 LOC of Drasta-session work on 2026-04-26.

      # Per rupayan-v2-autowire-2026-04-25 §3 (DevOps D-2): the autowire
      # codegen artifacts under framework/lochan/frontend/src/__generated__
      # must stay in sync with the source tree. We re-run the full
      # autowire pipeline, then `git diff --exit-code` over the
      # __generated__ dir + docs/schema/frontend/v2.json. Any diff = the
      # commit's frontend changes haven't been re-autowired; abort.
      - id: daksh-autowire-frontend
        name: daksh autowire --frontend (regenerate + verify clean)
        entry: tools/daksh/scripts/precommit-autowire-frontend.sh
        language: system
        pass_filenames: false
        always_run: true
        description: Re-run frontend autowire and fail if any committed artifact drifted.

      # Layer 1 emission target (founder rule 2026-04-26): janch tests are
      # framework-level autowire artifacts at framework/lochan/tests/autowired/.
      # Re-run janch.framework_emitter and `git diff --exit-code` over that
      # directory. Any diff = the commit's package code changed without
      # regenerating the autowire artifacts; abort.
      #
      # Companion to daksh-autowire-frontend above — same pattern, sixth
      # target surface of the autowire primitive (after checks Phase 0-3,
      # scaffold Phase 4, tests Phase 5a, docs ext #1, Drasta consumption
      # ext #2 — now janch-tests autowire ext #3).
      - id: daksh-autowire-janch-stale
        name: daksh autowire janch tests (regenerate + verify clean)
        entry: tools/daksh/scripts/precommit-autowire-janch-stale.sh
        language: system
        pass_filenames: false
        always_run: true
        description: Re-run framework janch autowire and fail if artifacts drifted.
