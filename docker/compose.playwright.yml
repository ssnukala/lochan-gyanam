# compose.playwright.yml — opt-in Playwright screenshot sidecar
# (mirrors compose.test.yml canonical opt-in pattern; Decision #5 WG-A4
# extended 2026-05-29 to cover §W-FP11-E2E-fwprod01-Capture-Run cohort).
#
# §W-FP11-E2E-fwprod01-Capture-Run (2026-05-29) — canonical Playwright
# sidecar for the FP11 patent-led-launch demo cohort screenshot capture.
#
# Composes with PR ssnukala/lochan#792 (canonical template at
# `framework/lochan/docs/screenshots/patent_demos_clickable/compose.playwright.template.yml`
# + CAPTURE-RUN.md operational README). Per founder direction 2026-05-28
# "do not add it to prod" — this file is OPT-IN; the production chain
# never runs Playwright.
#
# App-agnostic: uses ${COMPOSE_PROJECT_NAME}_app-network external network
# so the sidecar attaches to whatever app's running services without
# hardcoding fwprod01 / fwtest01 / etc.
#
# Three hard rules (mirrors compose.test.yml Decision #5 SHAPE):
#   1. Prod chain never imports Playwright — separate image ancestry
#      (mcr.microsoft.com/playwright lives OUTSIDE the lochan-* tree).
#   2. Sidecar is opt-in via `-f compose.yml -f docker/compose.playwright.yml`.
#   3. fwprod01 prod containers are never modified — only an EPHEMERAL
#      sibling service runs against the existing app-network.
#
# Usage (any app):
#
#   # Default desktop captures
#   cd /path/to/gyanam-workspace
#   docker compose \
#     -f apps/fwprod01/compose.yml \
#     -f framework/lochan-gyanam/docker/compose.playwright.yml \
#     run --rm playwright-screenshots
#
#   # Mobile (Pixel 7) captures
#   docker compose \
#     -f apps/fwprod01/compose.yml \
#     -f framework/lochan-gyanam/docker/compose.playwright.yml \
#     run --rm playwright-screenshots-mobile
#
# Or for a different app, just point at its compose.yml:
#
#   docker compose -f apps/fwtest01/compose.yml -f docker/compose.playwright.yml run --rm playwright-screenshots
#
# Output: PNG files land at framework/lochan/docs/screenshots/patent_demos_clickable/
# (bind-mount; see volumes below).
#
# Composes-with:
#   - ssnukala/lochan PR #782 (canonical Playwright spec + config)
#   - ssnukala/lochan PR #792 (template + CAPTURE-RUN.md)
#   - docker/compose.test.yml (Decision #5 canonical opt-in extension precedent)
#   - [[feedback-no-shims-no-bandaids-longterm-fix-only]] BINDING (canonical
#     compose extension > prod-image-pollution)
#   - [[feedback-composition-pattern-over-parallel-mirror]] BINDING (single
#     app-agnostic extension > N per-app compose files)

services:

  playwright-screenshots:
    # Canonical sidecar image (Tier 3) per Q-CAPTURE-RUN-BIND-MOUNT-LAYOUT
    # = B founder ratify 2026-05-31. BAKES IN @playwright/test + chromium
    # + framework Playwright config + e2e specs. Replaces the prior
    # mcr.microsoft.com/playwright:v1.50.0-noble base + bind-mount of
    # framework/lochan/frontend:/tests:ro (which coupled capture-run to
    # host pnpm install state).
    #
    # Build: docker build -f docker/03-frontend-playwright.Dockerfile -t lochan-frontend-playwright:latest .
    # (built automatically by util/scripts/build-app.sh Tier-3 step when
    # capture-run profile is invoked).
    image: lochan-frontend-playwright:latest
    profiles: [screenshots]

    # Attach to the SAME network the parent compose project created
    # (typically <app>_app-network — e.g. fwprod01_app-network).
    networks:
      - app-network

    volumes:
      # Screenshot output landing zone ONLY — Tier-3 image bakes in the
      # Playwright config + e2e specs (was bind-mounted at
      # ../../framework/lochan/frontend:/tests:ro pre-§6.5W=B; that mount
      # is REMOVED per Q-CAPTURE-RUN-BIND-MOUNT-LAYOUT = B canonical).
      # Host path matches canonical storage location pinned by PR #782
      # §A.5 invariant.
      - ../../framework/lochan/docs/screenshots/patent_demos_clickable:/screenshots:rw

      # storageState.json bind-mount for authenticated_admin.spec.ts —
      # per Day-14 authenticated admin screenshots dispatch. Generated
      # via `daksh pw-login <app>` (canonical capture-run setup); read
      # by Playwright at canonical path /storageState.json. APP defaults
      # to fwprod01 (canonical framework verify target); override via
      # APP env var for other apps. Read-only — spec consumes only.
      - ../../apps/${APP:-fwprod01}/storageState.json:/storageState.json:ro

    environment:
      # Resolves to the parent app's frontend service via Docker DNS.
      # Default points at the canonical fwprod01 frontend service name;
      # override at run-time for other apps.
      - BASE_URL=${PLAYWRIGHT_BASE_URL:-http://fwprod01-frontend-1:3000}
      - PLAYWRIGHT_BROWSERS_PATH=/ms-playwright
      # Per Q-SIDECAR-SCREENSHOT-DIR-PATH = β founder ratify 2026-05-31:
      # spec.ts reads SCREENSHOT_DIR env var; defaulting to its
      # canonical host-side path when unset. In the sidecar we override
      # to /screenshots which IS the writable bind-mount above. Spec
      # stays env-aware; image stays generic; default host behavior
      # preserved when running outside the sidecar.
      - SCREENSHOT_DIR=/screenshots
      # Path to the bind-mounted storageState.json for authenticated
      # spec (admin CRUD route capture). Decoupled from host-side
      # default (apps/<app>/storageState.json) so image stays generic.
      - STORAGE_STATE=/storageState.json
      - APP_NAME=${APP:-fwprod01}

    # working_dir matches the symlinked /tests path in the Tier-3 image
    # (`ln -s /app/frontend /tests` in 03-frontend-playwright.Dockerfile).
    # Existing capture-run commands assuming /tests as working dir +
    # config path work unchanged post-pivot to Tier-3 image.
    working_dir: /tests

    # SCREENSHOT_DIR resolves from __dirname (/tests/e2e/) → /tests/../docs/screenshots/patent_demos_clickable
    # which is the bind-mounted host path framework/lochan/docs/screenshots/patent_demos_clickable.
    command: >
      sh -c "
        echo '[playwright-sidecar] Desktop screenshot capture starting...';
        echo '[playwright-sidecar] BASE_URL = '$$BASE_URL;
        npx playwright test --project=screenshots --config=/tests/playwright.config.ts || true;
        echo '[playwright-sidecar] Desktop capture complete. Outputs at /screenshots/.';
        ls -la /screenshots/ | head -20
      "

  playwright-screenshots-mobile:
    extends:
      service: playwright-screenshots
    command: >
      sh -c "
        echo '[playwright-sidecar] Mobile (Pixel 7) screenshot capture starting...';
        echo '[playwright-sidecar] BASE_URL = '$$BASE_URL;
        npx playwright test --project=screenshots-mobile --config=/tests/playwright.config.ts || true;
        echo '[playwright-sidecar] Mobile capture complete. Outputs at /screenshots/.';
        ls -la /screenshots/ | head -20
      "

  # Build-4 render gate (Q-S2-04=A): content-assertion render check. Reuses the
  # screenshots sidecar image/network/storageState mount; runs the render-check
  # Playwright PROJECT which writes render_check_result.json into the /screenshots
  # bind-mount. `|| true` keeps the sidecar from erroring out before the verdict
  # is written — the spec ALWAYS writes the JSON before its expect(); the daksh
  # `render-check` service reads that verdict as the authoritative pass/fail (the
  # sidecar exit code is unreliable, same as the screenshot path). RENDER_CHECK_DIR
  # defaults to /screenshots (the writable mount) via the config metadata.
  render-check:
    extends:
      service: playwright-screenshots
    environment:
      - RENDER_CHECK_DIR=/screenshots
    command: >
      sh -c "
        echo '[playwright-sidecar] Render-check content assertion starting...';
        echo '[playwright-sidecar] BASE_URL = '$$BASE_URL;
        npx playwright test --project=render-check --config=/tests/playwright.config.ts || true;
        echo '[playwright-sidecar] Render-check complete. Verdict at /screenshots/render_check_result.json.';
        cat /screenshots/render_check_result.json 2>/dev/null | head -40
      "

  # Single-URL capture (`daksh screenshot <app> --url <path>`). Reuses the
  # screenshots sidecar image/network/storageState mount; runs the
  # screenshot-url Playwright PROJECT which reads SCREENSHOT_URL (injected by
  # daksh via `run -e`, not declared here — a runtime-only flag, same pattern
  # as render-check's RENDER_SCOPE) and writes ONE full-page PNG to the
  # /screenshots bind-mount. The sidecar-mode replacement for the phantom
  # build/cli/screenshot-url.sh (S0 ruling Q-S1-item4-gap#1 = A). `|| true`
  # keeps a per-page navigation failure from erroring the sidecar before the
  # daksh result mapping runs (same as the screenshot/render-check paths).
  screenshot-url:
    extends:
      service: playwright-screenshots
    command: >
      sh -c "
        echo '[playwright-sidecar] Single-URL capture starting: '$$SCREENSHOT_URL;
        echo '[playwright-sidecar] BASE_URL = '$$BASE_URL;
        npx playwright test --project=screenshot-url --config=/tests/playwright.config.ts || true;
        echo '[playwright-sidecar] Single-URL capture complete. Output at /screenshots/.';
        ls -la /screenshots/ | head -20
      "

networks:
  # External network reference — created by the parent app's compose.yml.
  # Pattern matches compose.test.yml + Docker's auto-naming convention:
  # `${COMPOSE_PROJECT_NAME}_app-network`. For fwprod01 → fwprod01_app-network.
  app-network:
    external: true
    name: ${COMPOSE_PROJECT_NAME}_app-network
