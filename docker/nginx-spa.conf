# nginx-spa.conf — SPA routing + reverse proxy for Lochan frontend (Tier 1.1).
#
# Use in app-level Dockerfile.frontend (multi-stage):
#   FROM nginx:alpine AS runner
#   COPY --from=builder /app/dist /usr/share/nginx/html
#   COPY /path/to/docker/nginx-spa.conf /etc/nginx/conf.d/default.conf
#
# Improvements over inline nginx.frontend.conf per-app:
#   - gzip on static assets (reduces wire bytes by ~70% for JS/CSS/JSON)
#   - immutable cache headers on hashed /assets/* (max-age=1y)
#   - no-cache on index.html (so SPA deploys reflect instantly)
#   - explicit try_files for SPA fallback (unknown routes → index.html, NOT 404)
#   - preserves backend proxy for /api
#
# Frontend container listens on 3000 (the compose port mapping).

server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Compression (reduces bundle transfer size ~70% on JS/CSS) ──
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        application/javascript
        application/json
        application/xml
        text/css
        text/plain
        text/xml
        image/svg+xml;

    # ── Proxy API calls to the backend service ──
    location /api {
        proxy_pass http://backend:5001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
        # Preserve upgrade headers for /api/ws
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── Hashed assets: immutable, cache for 1 year ──
    # Vite outputs /assets/*.{hash}.{js,css} — safe to cache aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── index.html: never cache (SPA entry point) ──
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires 0;
    }

    # ── SPA fallback: any unknown path serves index.html for client-side routing ──
    location / {
        try_files $uri $uri/ /index.html;
    }
}
