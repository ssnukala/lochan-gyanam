# AUTO-GENERATED by generate-app-config.py — regenerate with:
#   python3 scripts/generate-app-config.py
#
# Database: app-local postgres with persistent volume

services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "${PORT_POSTGRES:-5432}:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-lochan}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_DB=${POSTGRES_DB:-lochan}
    volumes:
      - fwprod01-pgdata:/var/lib/postgresql/data
    networks:
      - app-network
    restart: unless-stopped

  backend:
    image: lochan-backend-base:latest
    ports:
      - "${PORT_BACKEND:-8592}:5001"
    env_file: ${ENV_FILE:-.env.dev}
    depends_on:
      - postgres
    volumes:
      - ./log/backend:/app/log
      - ./data:/app/data
      # Wrap feature mounts (§5.8 + §5.15 of v1-launch-master-plan.md):
      # read-only view of wrap targets + the vardhan scanner package so
      # wrap_runner can scan /extpackages/<name>/ and emit annotations.
      - ../../extpackages:/extpackages:ro
      - ../../framework/lochan/packages/vardhan:/opt/gyanam/tools/vardhan:ro
      # Framework SPA self-config (2026-04-27): the running app's own
      # lochan.json contributes pages/widgets/standard-page metadata to
      # the manifest, symmetric to how installed packages contribute.
      - ../../framework/lochan/frontend/lochan.json:/app/framework-spa-lochan.json
      # Bind-mount the modified manifest discovery so empty-room edits
      # take effect without rebuilding the backend image.
      - ../../framework/lochan/packages/muulam/backend/muulam/discovery/manifest.py:/usr/local/lib/python3.13/site-packages/muulam/discovery/manifest.py
      # Bind-mount edited frontend configs so backend manifest aggregation
      # picks up the latest pages/widgets declarations from each framework pkg.
      - ../../framework/lochan/packages/gyanam/frontend/lochan.json:/app/packages/gyanam/frontend/lochan.json
      - ../../framework/lochan/packages/muulam/frontend/lochan.json:/app/packages/muulam/frontend/lochan.json
      - ../../framework/lochan/packages/trishul/frontend/lochan.json:/app/packages/trishul/frontend/lochan.json
    environment:
      - PYTHONPATH=/app
      - AI_OLLAMA_BASE_URL=http://shared-ollama:11434
      - AI_OLLAMA_ENABLED=true
      - MEDIA_INFERENCE_URL=http://media-inference:5010
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-lochan}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-lochan}
    entrypoint: ["bash", "/app/scripts/dev-entrypoint.sh"]
    command: ["uvicorn", "src.app:app", "--host", "0.0.0.0", "--port", "5001", "--reload"]
    networks:
      - app-network
      - shared-ai
      - shared-mail
    restart: unless-stopped

  frontend:
    image: lochan-frontend-base:dev
    ports:
      - "${PORT_FRONTEND:-8593}:3000"
    env_file: ${ENV_FILE:-.env.dev}
    depends_on:
      - backend
    volumes:
      - ./log/frontend:/app/log
      # Empty-room test (2026-04-27): bind-mount the framework SPA src/
      # so host edits (archive moves, target-state authoring) are visible
      # immediately via vite HMR. Reverse this after the test stabilizes.
      # See framework/_archive/README.md.
      # Targets are /app/frontend/* (the SPA workspace member, not /app/*)
      # post pnpm-workspace migration. 2026-05-05: targets corrected from
      # /app/* (pre-migration assumption that /app was the SPA root).
      - ../../framework/lochan/frontend/src:/app/frontend/src
      - ../../framework/lochan/frontend/public:/app/frontend/public
      - ../../framework/lochan/frontend/index.html:/app/frontend/index.html
      # Bind-mount vite + ts config so empty-room alias edits go live without rebuild.
      - ../../framework/lochan/frontend/vite.config.ts:/app/frontend/vite.config.ts
      - ../../framework/lochan/frontend/tsconfig.json:/app/frontend/tsconfig.json
      # tsconfig.base.json is the shared compiler-options root that
      # frontend/tsconfig.json (and abhilekh + mobile tsconfigs) extend.
      # Resolved by tsc relative to each consumer's directory.
      - ../../framework/lochan/tsconfig.base.json:/app/tsconfig.base.json
      # Bind-mount muulam tree (the framework package being absorbed-into)
      # so host edits during the lift work hot-reload immediately.
      # The dev image has these dirs baked at /app/<X>-src; we override them.
      - ../../framework/lochan/packages/muulam/frontend/rupayan:/app/rupayan-src
      - ../../framework/lochan/packages/muulam/frontend/roop:/app/roop-src
      - ../../framework/lochan/packages/muulam/frontend/templates:/app/lochan-templates-src
      - ../../framework/lochan/packages/muulam/frontend/hooks:/app/hooks-src
      - ../../framework/lochan/packages/muulam/frontend/app:/app/app-src
      - ../../framework/lochan/packages/muulam/frontend/lib:/app/lib-src
      - ../../framework/lochan/packages/muulam/frontend/components:/app/components-src
      - ../../framework/lochan/packages/muulam/frontend/providers:/app/providers-src
      - ../../framework/lochan/packages/muulam/frontend/types:/app/types-src
      # Override SOURCE directories at the baked /app/packages/<pkg>/frontend/
      # paths so edits hot-reload via vite. DO NOT mount the whole frontend/
      # directory — that would override the baked node_modules with the
      # host's pnpm symlinks (which dangle in the container because the
      # pnpm store hashes don't match). Mount source-only subdirs:
      #   components/, blocks/ (if separate), lochan.json, mandi.json,
      #   widgets/, hooks/, app/, lib/, providers/, types/, templates/, roop/, rupayan/
      # Keep node_modules/, package.json baked.
      # muulam — framework foundation (app shell, templates, blocks)
      - ../../framework/lochan/packages/muulam/frontend/components:/app/packages/muulam/frontend/components
      - ../../framework/lochan/packages/muulam/frontend/blocks:/app/packages/muulam/frontend/blocks
      - ../../framework/lochan/packages/muulam/frontend/widgets:/app/packages/muulam/frontend/widgets
      - ../../framework/lochan/packages/muulam/frontend/lochan.json:/app/packages/muulam/frontend/lochan.json
      # gyanam — AI/chat/knowledge (LoginFormBlock, ChatCanvas, etc.)
      - ../../framework/lochan/packages/gyanam/frontend/components:/app/packages/gyanam/frontend/components
      - ../../framework/lochan/packages/gyanam/frontend/hooks:/app/packages/gyanam/frontend/hooks
      - ../../framework/lochan/packages/gyanam/frontend/types:/app/packages/gyanam/frontend/types
      - ../../framework/lochan/packages/gyanam/frontend/widgets:/app/packages/gyanam/frontend/widgets
      - ../../framework/lochan/packages/gyanam/frontend/lochan.json:/app/packages/gyanam/frontend/lochan.json
      # trishul — auth widgets
      - ../../framework/lochan/packages/trishul/frontend/components:/app/packages/trishul/frontend/components
      - ../../framework/lochan/packages/trishul/frontend/widgets:/app/packages/trishul/frontend/widgets
      - ../../framework/lochan/packages/trishul/frontend/lochan.json:/app/packages/trishul/frontend/lochan.json
      # Framework SPA's own contributions: lochan.json, widgets/, blocks/.
      # The SPA itself is the running app — its own lochan.json declares
      # framework-default widgets and pages (e.g., the / landing).
      # Targets MUST be inside /app/frontend/ (the pnpm-workspace SPA member)
      # so widget files resolve @mui/* via /app/frontend/node_modules/.
      # 2026-05-06: corrected from /app/{lochan.json,widgets,blocks} after
      # pnpm-workspace migration moved deps under /app/frontend/.
      - ../../framework/lochan/frontend/lochan.json:/app/frontend/lochan.json
      - ../../framework/lochan/frontend/widgets:/app/frontend/widgets
      - ../../framework/lochan/frontend/blocks:/app/frontend/blocks
      # Bind-mount the modified autowire script so empty-room edits go live.
      - ../../framework/lochan/packages/daksh/backend/daksh/generators/generate-domain-manifest.py:/app/scripts/generate-domain-manifest.py
    environment:
      - PRIMARY_PACKAGE=
      - VITE_HMR_PORT=${PORT_FRONTEND:-8593}
      - NODE_PATH=/app/node_modules
    entrypoint: ["sh", "/app/scripts/frontend-entrypoint.sh"]
    command: ["pnpm", "run", "dev", "--host", "0.0.0.0", "--port", "3000"]
    networks:
      - app-network
    restart: unless-stopped

volumes:
  fwprod01-pgdata:
    driver: local

networks:
  app-network:
    driver: bridge
  shared-ai:
    external: true
  shared-mail:
    external: true
